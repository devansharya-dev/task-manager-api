<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page dashboard-page">
      <section class="card dashboard-header">
        <div>
          <p class="eyebrow">Task Dashboard</p>
          <h1>Your Tasks</h1>
          <p class="muted">Create, edit, complete, and delete your own tasks.</p>
        </div>
        <div class="header-actions">
          <button id="logoutButton" class="secondary-button">Logout</button>
        </div>
      </section>

      <section class="dashboard-grid">
        <div class="card">
          <h2>Create Task</h2>
          <form id="taskForm" class="form">
            <label>
              Task title
              <input type="text" id="taskTitle" placeholder="Finish backend assignment" required />
            </label>
            <button type="submit">Add Task</button>
          </form>
        </div>

        <div class="card">
          <div class="task-list-header">
            <h2>Task List</h2>
            <button id="refreshButton" class="secondary-button">Refresh</button>
          </div>
          <ul id="taskList" class="task-list"></ul>
          <p id="emptyState" class="muted">No tasks yet. Add your first one.</p>
        </div>
      </section>

      <section id="messageBox" class="message hidden"></section>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
