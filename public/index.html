<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth & Task App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page auth-page">
      <section class="card hero-card">
        <p class="eyebrow">Scalable REST API Demo</p>
        <h1>Authentication and task management in one clean project</h1>
        <p class="muted">
          Register a user, log in, receive a JWT token, and manage personal tasks
          through the API-powered dashboard.
        </p>
      </section>

      <section class="auth-grid">
        <div class="card">
          <h2>Register</h2>
          <form id="registerForm" class="form">
            <label>
              Name
              <input type="text" id="registerName" placeholder="John Doe" required />
            </label>
            <label>
              Email
              <input type="email" id="registerEmail" placeholder="john@example.com" required />
            </label>
            <label>
              Password
              <input type="password" id="registerPassword" placeholder="Minimum 6 characters" required />
            </label>
            <button type="submit">Create Account</button>
          </form>
        </div>

        <div class="card">
          <h2>Login</h2>
          <form id="loginForm" class="form">
            <label>
              Email
              <input type="email" id="loginEmail" placeholder="john@example.com" required />
            </label>
            <label>
              Password
              <input type="password" id="loginPassword" placeholder="Your password" required />
            </label>
            <button type="submit">Login</button>
          </form>
          <a class="link-button" href="./dashboard.html">Go to dashboard</a>
        </div>
      </section>

      <section id="messageBox" class="message hidden"></section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
